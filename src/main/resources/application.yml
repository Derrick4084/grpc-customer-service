spring:
  config:
    import: aws-secretsmanager:${DOCUMENT_DB_SECRET_NAME}?prefix=mongo.
  cloud:
    aws:
      region:
        static: us-east-1            # or your region
      credentials:
        use-default-aws-credentials-chain: true
  grpc:
    server:
      port: 9090
      enable-reflection: true
  #    security:
  #      enabled: true
  #      certificateChain: file:certificates/server
  #      privateKey: file:certificates/server
  application:
    name: grpc-customer-service
  data:
    mongo:
      host: ${CUSTOMER_DB_ENDPOINT}
      uri: mongodb://${mongo.username}:${mongo.password}@${CUSTOMER_DB_ENDPOINT}:${mongo.port}/?tls=true&tlsCAFile=/app/certs/rds-combined-ca-bundle.pem&replicaSet=rs0&readPreference=secondaryPreferred&retryWrites=false
  #      username: ${DOCUMENT_DB_USERNAME}
  #      secret: ${DOCUMENT_DB_SECRET_NAME}
  #      port: ${DOCUMENT_DB_PORT}




