spring:
  cloud:
    aws:
      region:
        static: us-east-1            # or your region
      credentials:
        use-default-aws-credentials-chain: true
  grpc:
    server:
      port: 9090
      enable-reflection: true
  #    security:
  #      enabled: true
  #      certificateChain: file:certificates/server
  #      privateKey: file:certificates/server
  application:
    name: grpc-customer-service
  data:
    mongo:
      uri: mongodb://${DOCUMENT_DB_USERNAME}:${DOCUMENT_DB_PASSWORD}@${CUSTOMER_DB_ENDPOINT}:${DOC_DB_PORT}/customers?ssl=true&sslCAFile=/app/certs/rds-combined-ca-bundle.pem&replicaSet=rs0&readPreference=secondaryPreferred&retryWrites=false
      username: ${DOCUMENT_DB_USERNAME}
      secret: ${DOCUMENT_DB_SECRET_NAME}
      host: ${CUSTOMER_DB_ENDPOINT}
      port: ${DOCUMENT_DB_PORT}




